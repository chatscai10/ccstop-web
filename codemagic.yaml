# Codemagic CI：iOS 雲端建置 + 上傳 TestFlight（全程免 Mac）
# 使用前置作業（一次性，都在網頁上完成）：
#   1. codemagic.io 用 GitHub 帳號登入 → Add application → 選 chatscai10/ccstop-web
#   2. App Store Connect 網頁 → 使用者與存取 → 整合 → 產生 API 金鑰（App Manager 權限）
#   3. Codemagic → Teams > Integrations > Developer Portal → 貼上 API Key（名稱取 ccstop_asc）
#   4. Codemagic 會用這把 key 自動建立/下載簽名憑證與描述檔，不需要 Mac 或 Xcode
workflows:
  ios-testflight:
    name: iOS build → TestFlight
    max_build_duration: 45
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: ccstop_asc
    environment:
      groups:
        - signing            # Codemagic 網頁設 CERTIFICATE_PRIVATE_KEY_B64（全帳號共用固定私鑰，Secret）
      node: 22
      xcode: latest
      vars:
        BUNDLE_ID: "com.chatscai10.ccstop"
        APP_STORE_APP_ID: 6791806321
    scripts:
      - name: 安裝依賴
        script: npm install
      - name: 準備遊戲網頁資源
        script: bash ./build-www.sh
      - name: Capacitor 同步 iOS
        script: npx cap sync ios
      - name: 設定 build number
        # Apple 不接受重複 build 號，用 Codemagic 遞增計數器確保唯一
        script: |
          cd ios/App
          agvtool new-version -all "$PROJECT_BUILD_NUMBER"
      - name: 設定簽名（全帳號共用固定私鑰）
        script: |
          keychain initialize
          echo "$CERTIFICATE_PRIVATE_KEY_B64" | base64 --decode > /tmp/cert_key.pem
          # 自癒：只刪「失效」描述檔（憑證變動會使舊描述檔失效，沿用會讓 archive 報 requires a provisioning profile）
          app-store-connect profiles list --type IOS_APP_STORE --state INVALID --json 2>/dev/null \
            | jq -r '(if type=="object" then .data else . end)[]?.id // empty' \
            | while read pid; do [ -n "$pid" ] && app-store-connect profiles delete "$pid" --ignore-not-found || true; done
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: 建置簽名 IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-aab:
    # 備用：雲端建 Android（本機其實就能建，這條給手機遠端觸發用）
    name: Android release AAB
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      node: 22
      java: 21
      groups:
        - android_signing # 在 Codemagic 網頁設 CM_KEYSTORE(base64)/CM_KEYSTORE_PASSWORD/CM_KEY_ALIAS/CM_KEY_PASSWORD
    scripts:
      - name: 安裝依賴
        script: npm install
      - name: 準備遊戲網頁資源
        script: bash ./build-www.sh
      - name: Capacitor 同步 Android
        script: npx cap sync android
      - name: 還原 keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=/tmp/keystore.jks
          EOF
      - name: 建置 AAB
        script: cd android && ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
